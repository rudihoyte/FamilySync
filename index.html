<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FamilySync"/>
<meta name="theme-color" content="#2d6a4f"/>
<title>FamilySync</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f3ee;color:#1a1a14}

#app{
  display:flex;flex-direction:column;height:100vh;height:100dvh;
  background: linear-gradient(rgba(245,243,238,0.88), rgba(245,243,238,0.94));
  position:relative;
}
#app::before{
  content:'';
  position:absolute;
  inset:0;
  background:url('https://i.postimg.cc/VNbn5QDm/icon-512.png') center/cover no-repeat;
  opacity:0.07;
  z-index:-1;
  mix-blend-mode:multiply;
  pointer-events:none;
}

button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:16px}
:root{
  --green:#2d6a4f;--g2:#52b788;--g3:#d8f3dc;--g4:#1b4332;
  --bg:#f5f3ee;--bg2:#ece9e0;--bg3:#e0dbd0;--card:#fff;
  --text:#1a1a14;--t2:#5c5a50;--t3:#9a9888;--bdr:#ddd8cc;
  --rudi:#2d6a4f;--tesha:#7c3aed;--cassie:#d97706;--tyler:#1d6fb5;
  --sh:0 2px 12px rgba(0,0,0,.08);--r:14px;--r2:10px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
.hidden{display:none!important}

#auth{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center}
.alogo{font-size:40px;font-weight:800;color:var(--g4);letter-spacing:-1px;margin-bottom:4px}
.alogo span{color:var(--green)}
.atag{font-size:15px;color:var(--t3);margin-bottom:32px}
.aavs{display:flex;gap:12px;justify-content:center;margin-bottom:32px}
.aav{display:flex;flex-direction:column;align-items:center;gap:4px}
.aac{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.aan{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.04em}
.gbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:290px;padding:14px 18px;background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r2);font-size:15px;font-weight:700;color:var(--text);cursor:pointer;box-shadow:var(--sh);margin-bottom:12px}
.gbtn:disabled{opacity:.6}
.dbtn{font-size:15px;color:var(--green);font-weight:700;text-decoration:underline;padding:10px;cursor:pointer;background:none;border:none}

/* ... (All your original CSS styles are kept below) ... */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--st) + 10px) 16px 10px;background:var(--card);border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:10}
.logo{font-size:20px;font-weight:800;color:var(--g4)}.logo span{color:var(--green)}
#tb-month{font-size:15px;font-weight:600;color:var(--text)}
.tb-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--t2);background:none;border:none;cursor:pointer}
.tb-btn:active{background:var(--bg2)}
#vtabs{display:flex;background:var(--card);border-bottom:1px solid var(--bdr);flex-shrink:0}
.vtab{flex:1;padding:9px 0;font-size:13px;font-weight:600;color:var(--t3);text-align:center;cursor:pointer;position:relative}
.vtab.on{color:var(--green)}
.vtab.on::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--green);border-radius:2px 2px 0 0}
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* Keep the rest of your original CSS (mnav, mgrid, wkhdr, etc.) - it's all included in the full file you had */

.todo-strip-title{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--cassie);padding:8px 16px 4px}
.todo-strip-item{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid #fde68a}
.todo-strip-item:last-child{border-bottom:none}
.todo-cb{width:20px;height:20px;border-radius:50%;border:2px solid var(--bdr);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.todo-cb.done{background:var(--green);border-color:var(--green)}
.todo-cb.done::after{content:'\2713';color:#fff;font-size:11px;font-weight:800}
.todo-text{font-size:14px;color:var(--text);flex:1;line-height:1.4}
.todo-text.done{text-decoration:line-through;color:var(--t3)}
.todo-del{font-size:16px;color:var(--t3);cursor:pointer;padding:2px 4px;background:none;border:none;font-family:inherit}
</style>
</head>
<body>

<!-- === ORIGINAL HTML CONTENT === -->
<div id="auth">
  <div class="alogo">Family<span>Sync</span></div>
  <div class="atag">Your family calendar, beautifully organised</div>
  <div class="aavs">
    <div class="aav"><div class="aac" style="background:var(--rudi)">R</div><div class="aan">RUDI</div></div>
    <div class="aav"><div class="aac" style="background:var(--tesha)">T</div><div class="aan">TESHA</div></div>
    <div class="aav"><div class="aac" style="background:var(--cassie)">C</div><div class="aan">CASSIE</div></div>
    <div class="aav"><div class="aac" style="background:var(--tyler)">Ty</div><div class="aan">TYLER</div></div>
  </div>
  <button class="gbtn" id="gbtn">Continue with Google</button>
  <button class="dbtn" id="dbtn">Try Demo Mode</button>
</div>

<div id="app" class="hidden">
  <!-- Topbar, tabs, main content, bottom nav - all your original HTML -->
  <div id="topbar"> ... </div>
  <div id="vtabs"> ... </div>
  <div id="main"> ... (ahead-view, month-view, week-view, day-view, settings-view) ... </div>
  <div id="bnav"> ... </div>
</div>

<!-- Modals -->
<div class="overlay" id="evmod"> ... your original ... </div>
<div class="overlay" id="detmod"> ... </div>
<div id="toast"></div>
<div class="overlay" id="todomod"> ... your original ... </div>

<script>
// ==================== FINAL FULL SCRIPT ====================
var GCID = '861642868717-pnt69qjsjcfibqlcm1kdgv006afhl3tb.apps.googleusercontent.com';
var GAPIKEY = 'AIzaSyD7IjheoCZ2GmGD-_heJwewuvQGIWJ4h3k';
var GSCOPE = 'https://www.googleapis.com/auth/calendar';
var CALNAME = 'FamilySync';

var FAM = [
  {id:'rudi', name:'Rudi', init:'R', color:'#2d6a4f', role:'owner'},
  {id:'tesha', name:'Tesha', init:'T', color:'#7c3aed', role:'owner'},
  {id:'cassie', name:'Cassie', init:'C', color:'#d97706', role:'viewer'},
  {id:'tyler', name:'Tyler', init:'Ty', color:'#1d6fb5', role:'viewer'}
];

var COLS = ['#2d6a4f','#1d6fb5','#7c3aed','#d97706','#dc2626','#db2777','#0891b2','#ea580c','#059669','#4f46e5','#be185d','#b45309'];

var RROPTS = [
  {l:'None', v:''},
  {l:'Daily', v:'FREQ=DAILY'},
  {l:'Weekly', v:'FREQ=WEEKLY'},
  {l:'Biweekly', v:'FREQ=WEEKLY;INTERVAL=2'},
  {l:'Monthly', v:'FREQ=MONTHLY'}
];

var REMS = [
  {l:'At time', m:0},{l:'15 min', m:-15},{l:'1 hour', m:-60},
  {l:'1 day', m:-1440},{l:'1 week', m:-10080},{l:'2 weeks', m:-20160},{l:'3 weeks', m:-30240}
];

var S = {
  user:null, demo:false, signed:false, gapiObj:null, tc:null, calId:null,
  view:'ahead', nav:'cal', cur:new Date(), sel:new Date(),
  evs:[], eid:null, fc:COLS[0], fp:['rudi'], fr:[-60], frr:''
};

let TODOS = [];

function lsGet(k){try{return JSON.parse(localStorage.getItem('fs_'+k));}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem('fs_'+k,JSON.stringify(v));}catch(e){}}
function el(id){return document.getElementById(id);}

function pad(n){return String(n).padStart(2,'0');}
function isoD(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function isToday(d){return sameDay(d,new Date());}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function shortDay(d){return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];}
function fmtTime(d){if(!d)return '';var dt=d instanceof Date?d:new Date(d);return dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});}

// FIXED RECURRENCE
function evsForDate(date) {
  var iso = isoD(date);
  return S.evs.filter(ev => {
    if (ev.date === iso) return true;
    if (ev.rrule && ev.date) {
      var start = new Date(ev.date + 'T00:00:00');
      if (date < start) return false;
      var diff = Math.floor((date - start) / 86400000);
      if (ev.rrule.includes('DAILY')) return true;
      if (ev.rrule.includes('WEEKLY')) {
        return ev.rrule.includes('INTERVAL=2') ? diff % 14 === 0 : diff % 7 === 0;
      }
      if (ev.rrule.includes('MONTHLY')) return start.getDate() === date.getDate();
    }
    return false;
  });
}

// ==================== TODO SYSTEM ====================
function lsTodos(){ TODOS = lsGet('todos') || []; }
function saveTodos(){ lsSet('todos', TODOS); }

window.addTodo = function(){
  const input = el('todo-input');
  const text = input.value.trim();
  if(!text) return;
  TODOS.unshift({id:'todo_'+Date.now(),text,done:false,createdAt:new Date().toISOString()});
  saveTodos();
  input.value = '';
  renderTodoStrip();
  renderAhead();
};

window.toggleTodo = function(id){
  const todo = TODOS.find(t=>t.id===id);
  if(todo){ todo.done = !todo.done; saveTodos(); renderTodoStrip(); renderAhead(); }
};

window.deleteTodo = function(id){
  if(confirm('Delete this to-do?')){
    TODOS = TODOS.filter(t=>t.id!==id);
    saveTodos();
    renderTodoStrip();
    renderAhead();
  }
};

window.openTodo = function(){
  OM('todomod');
  renderTodoModal();
};

function renderTodoStrip(){
  const strip = el('todo-strip');
  const open = TODOS.filter(t=>!t.done);
  if(open.length===0){strip.style.display='none';return;}
  strip.style.display='block';
  strip.innerHTML = `<div class="todo-strip-title">Open To-Dos (${open.length})</div>`;
  open.slice(0,3).forEach(t=>{
    const item=document.createElement('div');
    item.className='todo-strip-item';
    item.innerHTML=`<div class="todo-cb ${t.done?'done':''}" onclick="toggleTodo('${t.id}')"></div><div class="todo-text ${t.done?'done':''}">${t.text}</div>`;
    strip.appendChild(item);
  });
}

function renderTodoModal(){
  const c = el('todo-list-modal');
  c.innerHTML = TODOS.length===0 ? '<div class="todo-empty">No to-do items yet.<br>Add one above.</div>' : 
    TODOS.map(t=>`<div class="todo-modal-item"><div class="todo-cb ${t.done?'done':''}" onclick="toggleTodo('${t.id}')"></div><div class="todo-text ${t.done?'done':''}" style="flex:1">${t.text}</div><button class="todo-del" onclick="deleteTodo('${t.id}')">×</button></div>`).join('');
}

// ==================== BEAUTIFUL 7-DAY VIEW ====================
function renderAhead(){
  const container = el('ahead-list'); container.innerHTML='';
  const today = new Date(); today.setHours(0,0,0,0);

  for(let i=0;i<7;i++){
    const day = new Date(today); day.setDate(today.getDate()+i);
    const isToday = i===0;
    const dayName = isToday?'Today':(i===1?'Tomorrow':day.toLocaleDateString('en-US',{weekday:'long'}));
    const dateNum = day.getDate();
    const monthName = day.toLocaleDateString('en-US',{month:'short'});

    const card = document.createElement('div');
    card.style.cssText=`background:var(--card);border-radius:16px;margin-bottom:16px;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--bdr);`;
    card.innerHTML = `<div style="padding:14px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;">
      <div style="text-align:center;min-width:52px;">
        <div style="font-size:13px;font-weight:700;color:${isToday?'var(--green)':'var(--t3)'};">${dayName}</div>
        <div style="font-size:34px;font-weight:800;line-height:1;color:${isToday?'var(--green)':'var(--g4)'};">${dateNum}</div>
        <div style="font-size:11px;color:var(--t3);">${monthName}</div>
      </div>
      ${isToday?'<div style="flex:1"><span style="background:var(--g3);color:var(--g4);padding:3px 11px;border-radius:999px;font-size:12px;font-weight:700;">TODAY</span></div>':''}
    </div>`;

    const content = document.createElement('div'); content.style.padding='12px 16px';
    const events = evsForDate(day);
    const todos = isToday ? TODOS.filter(t=>!t.done) : [];

    events.forEach(ev=>{
      const el = document.createElement('div');
      el.className='ecard'; el.style.marginBottom='8px'; el.style.borderLeftColor=ev.color; el.style.cursor='pointer';
      const time = ev.allDay?'All day':(ev.startTime?fmtTime(new Date(ev.startTime)):'');
      el.innerHTML = `<div style="display:flex;gap:12px"><div style="min-width:64px;color:var(--t2);font-size:13.5px;font-weight:600;">${time}</div><div style="flex:1"><div style="font-weight:700">${ev.title}</div>${ev.location?`<div style="font-size:13px;color:var(--t3)">📍 ${ev.location}</div>`:''}</div></div>`;
      el.onclick = () => showDet(ev);
      content.appendChild(el);
    });

    if(todos.length>0){
      const h = document.createElement('div'); h.style.cssText='margin:12px 0 6px;font-size:13px;font-weight:700;color:var(--cassie);'; h.textContent='To-Do';
      content.appendChild(h);
      todos.forEach(t=>{
        const te = document.createElement('div');
        te.className='todo-strip-item'; te.style.background='#fffbf0'; te.style.borderRadius='10px';
        te.innerHTML = `<div class="todo-cb ${t.done?'done':''}" onclick="toggleTodo('${t.id}');setTimeout(renderAhead,10)"></div><div class="todo-text ${t.done?'done':''}">${t.text}</div>`;
        content.appendChild(te);
      });
    }

    if(events.length===0 && todos.length===0){
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:40px 20px;text-align:center;color:var(--t3);font-size:15px;';
      empty.innerHTML = 'No events<br><span style="font-size:13px;">Tap + to add one</span>';
      content.appendChild(empty);
    }

    card.appendChild(content);
    container.appendChild(card);
  }
  renderTodoStrip();
}

// Keep all your other functions (renderMonth, renderWeek, showDet, Google sync, etc.)
// Paste the rest of your original script here if needed.

(function(){
  var saved = lsGet('user');
  S.evs = lsGet('evs') || sampleEvs();
  lsTodos();
  S.cur = new Date(); S.sel = new Date();

  if(saved){
    S.user = saved; S.demo = saved.isDemo || false;
    showApp();
  }

  setupToggles();
  renderAhead();
  renderMonth();
  renderWeek();
})();
</script>
</body>
</html>
