function evsForDate(date) {
  var iso = isoD(date);
  return S.evs.filter(function(ev) {
    if (ev.date === iso) return true;
    if (ev.rrule && ev.date) {

        </div>
        ${isToday ? '<div style="flex:1;"><span style="background:var(--g3);color:var(--g4);padding:3px 11px;border-radius:999px;font-size:12px;font-weight:700;">TODAY</span></div>' : ''}
      </div>
    `;

    const content = document.createElement('div'); content.style.padding = '12px 16px';
    const dayEvents = evsForDate(day);
    const dayTodos = isToday ? TODOS.filter(t => !t.done) : [];

    // Events
    dayEvents.forEach(ev => {
      const evEl = document.createElement('div');
      evEl.className = 'ecard';
      evEl.style.marginBottom = '8px';
      evEl.style.borderLeftColor = ev.color;
      evEl.style.cursor = 'pointer';
      const timeStr = ev.allDay ? 'All day' : (ev.startTime ? fmtTime(new Date(ev.startTime)) : '');
      evEl.innerHTML = `<div style="display:flex;gap:12px;align-items:start;"><div style="min-width:64px;color:var(--t2);font-size:13.5px;font-weight:600;">${timeStr}</div><div style="flex:1;"><div style="font-weight:700;font-size:15px;">${ev.title}</div>${ev.location?`<div style="font-size:13px;color:var(--t3);margin-top:2px;">📍 ${ev.location}</div>`:''}</div></div>`;
      evEl.onclick = () => showDet(ev);
      content.appendChild(evEl);
    });

    // To-Dos
    if (dayTodos.length > 0) {
      const th = document.createElement('div');
      th.style.cssText = 'margin:12px 0 6px;font-size:13px;font-weight:700;color:var(--cassie);';
      th.textContent = 'To-Do';
      content.appendChild(th);
      dayTodos.forEach(todo => {
        const tEl = document.createElement('div');
        tEl.className = 'todo-strip-item';
        tEl.style.background = '#fffbf0';
        tEl.style.borderRadius = '10px';
        tEl.innerHTML = `<div class="todo-cb ${todo.done?'done':''}" onclick="toggleTodo('${todo.id}');setTimeout(renderAhead,10)"></div><div class="todo-text ${todo.done?'done':''}">${todo.text}</div>`;
        content.appendChild(tEl);
      });
    }

    if (dayEvents.length === 0 && dayTodos.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:40px 20px;text-align:center;color:var(--t3);font-size:15px;';
      empty.innerHTML = 'No events<br><span style="font-size:13px;">Tap + to add one</span>';
      content.appendChild(empty);
    }

    dayCard.appendChild(content);
    container.appendChild(dayCard);
  }
  renderTodoStrip();
}

    S.user = saved; S.demo = saved.isDemo || false;
    showApp();

  renderAhead();
  renderMonth();
  renderWeek();

</script>
